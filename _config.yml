title: marco pazzo
baseurl: "/marco-pazzo"
url: "https://cialdecompatibili-netizen.github.io"
email:
description: >-
  Un sito Jekyll con CMS integrato, gestito da CMSPush.
twitter_username: username
github_username: username
minimal_mistakes_skin: default
search: true

markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
exclude:
  - vendor
  - docs

permalink: /:categories/:title/

timezone:

collections:
  products:
    output: true
    permalink: /shop/:name/

include:
  - _pages

plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Il tuo nome"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Una frase su di te."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: "_products"
      type: products
    values:
      layout: product
      classes: wide
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
